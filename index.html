<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--gold:#FFD700;--blue:#00BFFF;--red:#FF4444;--dark:#0a0a1a;--panel:#111133;
--cyan:#00ffff;--magenta:#ff00ff;--green:#00ff88;--orange:#ff8800;
}
body{background:var(--dark);color:#eee;font-family:'VT323',monospace;overflow-x:hidden;min-height:100vh}

@keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
@keyframes glowPulse{0%,100%{text-shadow:0 0 10px var(--gold),0 0 20px var(--gold)}50%{text-shadow:0 0 20px var(--gold),0 0 40px var(--gold),0 0 60px var(--orange)}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

body::before{
content:'';position:fixed;top:0;left:0;width:100%;height:4px;
background:linear-gradient(transparent,rgba(0,255,255,.05),transparent);
animation:scanline 8s linear infinite;z-index:999;pointer-events:none;
}
body::after{
content:'';position:fixed;inset:0;
background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);
z-index:998;pointer-events:none;
}

.wrapper{max-width:900px;margin:0 auto;padding:20px 16px 80px;position:relative;z-index:1}
.page{animation:fadeIn .4s ease-out}

/* HEADER */
.header{text-align:center;padding:50px 20px 40px}
.header-badge{
display:inline-block;padding:6px 20px;border:2px solid var(--gold);
font-family:'Press Start 2P',monospace;font-size:10px;color:var(--gold);
letter-spacing:3px;margin-bottom:16px;background:rgba(255,215,0,.05);
position:relative;
}
.header-badge::before,.header-badge::after{
content:'◆';position:absolute;top:50%;transform:translateY(-50%);color:var(--gold);
}
.header-badge::before{left:-14px}.header-badge::after{right:-14px}
.title{
font-family:'Press Start 2P',monospace;font-size:clamp(18px,5vw,36px);
color:var(--gold);line-height:1.6;animation:glowPulse 3s ease-in-out infinite;
}
.subtitle{
font-family:'Press Start 2P',monospace;font-size:clamp(9px,2.5vw,13px);
color:var(--cyan);margin-top:8px;text-shadow:0 0 10px var(--cyan);
}
.date-bar{
margin-top:20px;padding:10px 0;border-top:1px solid rgba(255,215,0,.2);
border-bottom:1px solid rgba(255,215,0,.2);
font-size:20px;color:var(--cyan);letter-spacing:2px;
}
.dot{color:var(--red);animation:blink 1s infinite}

/* BACK BUTTON */
.back-btn{
font-family:'Press Start 2P',monospace;font-size:10px;color:var(--cyan);
cursor:pointer;padding:12px 0;letter-spacing:1px;
border-bottom:1px solid rgba(0,255,255,.15);margin-bottom:10px;
transition:color .2s;
}
.back-btn:hover{color:var(--gold)}

/* ARCHIVE GRID */
.archive-grid{
display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:16px;margin:30px 0;
}
.archive-card{
padding:24px;border:1px solid rgba(255,215,0,.2);
background:linear-gradient(135deg,rgba(17,17,51,.9),rgba(10,10,26,.95));
cursor:pointer;transition:all .3s;position:relative;overflow:hidden;
animation:cardIn .5s ease-out both;
}
.archive-card:nth-child(1){animation-delay:.05s}
.archive-card:nth-child(2){animation-delay:.15s}
.archive-card:nth-child(3){animation-delay:.25s}
.archive-card:nth-child(4){animation-delay:.35s}
.archive-card::before{
content:'';position:absolute;top:0;left:0;width:100%;height:2px;
background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0;transition:opacity .3s;
}
.archive-card:hover{
border-color:var(--gold);
background:linear-gradient(135deg,rgba(255,215,0,.08),rgba(17,17,51,.9));
transform:translateY(-4px);box-shadow:0 8px 30px rgba(255,215,0,.1);
}
.archive-card:hover::before{opacity:1}
.card-date{font-family:'Press Start 2P',monospace;font-size:14px;color:var(--gold);margin-bottom:4px}
.card-time{font-size:18px;color:var(--cyan);margin-bottom:12px}
.card-players{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.card-player{
font-size:16px;color:var(--green);padding:2px 8px;
border:1px solid rgba(0,255,136,.2);background:rgba(0,255,136,.03);
}
.card-stats{display:flex;gap:16px;font-size:14px;color:#888;margin-bottom:12px}
.card-arrow{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--magenta);letter-spacing:2px}

/* ROSTER */
.roster{
margin:40px 0;padding:24px;border:1px solid rgba(0,255,255,.15);
background:linear-gradient(135deg,rgba(17,17,51,.8),rgba(10,10,26,.9));
position:relative;overflow:hidden;animation:slideUp .6s ease-out;
}
.roster::before{
content:'';position:absolute;top:0;left:0;width:100%;height:2px;
background:linear-gradient(90deg,transparent,var(--cyan),transparent);
}
.roster-title{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--cyan);margin-bottom:18px;letter-spacing:2px}
.players{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.player{
padding:8px 16px;border:1px solid rgba(255,215,0,.3);
background:rgba(255,215,0,.05);font-size:20px;color:var(--gold);
transition:all .3s;
}
.player:hover{background:rgba(255,215,0,.15);transform:scale(1.05);border-color:var(--gold)}

/* SECTIONS */
.section{margin:40px 0;animation:slideUp .6s ease-out}
.section-header{
display:flex;align-items:center;gap:12px;margin-bottom:20px;
padding-bottom:10px;border-bottom:2px solid var(--magenta);
}
.section-icon{
width:36px;height:36px;display:flex;align-items:center;justify-content:center;
border:2px solid var(--magenta);font-size:18px;flex-shrink:0;background:rgba(255,0,255,.1);
}
.section-label{font-family:'Press Start 2P',monospace;font-size:clamp(8px,2vw,11px);color:var(--magenta);letter-spacing:1px}
.overview-text{font-size:18px;line-height:1.8;color:#bbb;margin-bottom:12px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin:20px 0}
.stat-card{padding:16px;text-align:center;border:1px solid rgba(0,255,255,.15);background:rgba(0,255,255,.03);transition:all .3s}
.stat-card:hover{border-color:var(--cyan);transform:translateY(-2px)}
.stat-val{font-family:'Press Start 2P',monospace;font-size:20px;color:var(--cyan);margin-bottom:6px}
.stat-lbl{font-size:16px;color:#888;letter-spacing:1px}

/* MATCH CARDS */
.match{
margin:20px 0;padding:20px;border-left:3px solid var(--blue);
background:linear-gradient(90deg,rgba(0,191,255,.05),transparent);
}
.match-num{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--blue);margin-bottom:8px;letter-spacing:2px}
.match-heroes{
font-size:18px;color:var(--green);margin:8px 0;padding:8px 12px;
border:1px dashed rgba(0,255,136,.2);background:rgba(0,255,136,.03);
}
.match-heroes span{color:var(--cyan);font-size:14px}
.match-desc{font-size:18px;line-height:1.7;color:#ccc;margin-top:10px}
.match-result{
display:inline-block;margin-top:12px;padding:4px 14px;
font-family:'Press Start 2P',monospace;font-size:10px;letter-spacing:1px;
}
.win{background:rgba(0,255,136,.15);border:1px solid var(--green);color:var(--green)}
.loss{background:rgba(255,68,68,.15);border:1px solid var(--red);color:var(--red)}

/* MOMENTS */
.moment{
margin:16px 0;padding:16px 18px;
border:1px solid rgba(255,136,0,.2);
background:linear-gradient(135deg,rgba(255,136,0,.04),rgba(255,0,255,.02));
transition:all .3s;
}
.moment:hover{border-color:var(--orange);background:linear-gradient(135deg,rgba(255,136,0,.08),rgba(255,0,255,.04))}
.moment-tag{
font-family:'Press Start 2P',monospace;font-size:8px;color:var(--orange);
letter-spacing:2px;margin-bottom:8px;display:inline-block;
padding:2px 8px;border:1px solid var(--orange);
}
.moment p{font-size:18px;line-height:1.7;color:#ddd}
.dialog{
margin:10px 0 6px;padding:10px 14px;border-left:2px solid var(--cyan);
background:rgba(0,255,255,.03);font-size:17px;color:var(--cyan);font-style:italic;
}

/* QUOTE WALL */
.quote-wall{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;margin:20px 0}
.quote-card{
padding:14px;border:1px solid rgba(255,0,255,.15);
background:rgba(255,0,255,.03);font-size:17px;
color:var(--magenta);font-style:italic;transition:all .3s;
}
.quote-card:hover{border-color:var(--magenta);background:rgba(255,0,255,.08)}

/* MARQUEE */
.marquee-bar{
margin:40px 0;padding:10px 0;overflow:hidden;
border-top:1px solid rgba(255,215,0,.15);border-bottom:1px solid rgba(255,215,0,.15);
}
.marquee-track{overflow:hidden;white-space:nowrap}
.marquee-text{
display:inline-block;white-space:nowrap;
animation:marquee 35s linear infinite;
font-family:'Press Start 2P',monospace;font-size:10px;
color:var(--gold);letter-spacing:3px;
}

/* DIVIDER & FOOTER */
.pixel-divider{
text-align:center;margin:30px 0;color:rgba(255,215,0,.2);
font-family:'Press Start 2P',monospace;font-size:8px;letter-spacing:6px;
}
.footer{text-align:center;margin-top:60px;padding-top:30px;border-top:1px solid rgba(255,215,0,.1)}
.footer p{font-family:'Press Start 2P',monospace;font-size:9px;color:rgba(255,215,0,.3);line-height:2}
</style>
</head>

const MARQUEE = "◆ DIFOTO CUK ◆ BISA ENGGAK ◆ ABSOLUT CINEMA ◆ IZIN IZIN ◆ BAPAK GENDUT ◆ TERMINAL JOYOBOYO ◆ TOLONG POLISI ◆ PERMAINAN OTAK ◆ LILI TAWON ◆ SUWON JANCOK ◆ HUKUM MURPHY ◆ PLAY STORE CUK ◆ JADI JEMBATAN ◆ MENTAL CR7 ◆ DIJEBAK JUNGLE ◆ MARIA O ◆ SPAM CUK ◆ OBSIDIAN FIRST ITEM ◆ ";
const ICONS = ["①","②","③","④","⑤"];

let currentPage = "home";
let currentSession = null;

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  if (currentPage === "home") renderHome(app);
  else renderDetail(app);
  window.scrollTo({top: 0, behavior: "smooth"});
}

function renderHome(app) {
  app.innerHTML = `
    <div class="page">
      <div class="header">
        <div class="header-badge">◆ MATCH ARCHIVE ◆</div>
        <div class="title">BARUNG XIII</div>
        <div class="subtitle">「 MABAR SABAR — SESSION ARCHIVE 」</div>
        <div class="date-bar"><span class="dot">●</span> RANKED 5-STACK &nbsp;|&nbsp; SURABAYA SQUAD <span class="dot">●</span></div>
      </div>
      ${marqueeHTML()}
      <div class="archive-grid">
        ${SESSIONS.map((s,i) => `
          <div class="archive-card" onclick="openSession(${i})" style="animation-delay:${i*.1}s">
            <div class="card-date">${s.date}</div>
            <div class="card-time">${s.time}</div>
            <div class="card-players">${s.players.map(p=>`<span class="card-player">▶ ${p}</span>`).join("")}</div>
            <div class="card-stats"><span>${s.stats.matches} GAMES</span><span>CHAOS: ${s.stats.chaos}</span></div>
            <div class="card-arrow">BUKA RECAP →</div>
          </div>
        `).join("")}
      </div>
      ${footerHTML()}
    </div>
  `;
}

function renderDetail(app) {
  const s = currentSession;
  app.innerHTML = `
    <div class="page">

        <div class="date-bar"><span class="dot">●</span> ${s.date} &nbsp;|&nbsp; ${s.time} &nbsp;|&nbsp; RANKED 5-STACK <span class="dot">●</span></div>
      </div>

      <div class="roster">
        <div class="roster-title">◈ SQUAD ROSTER ◈</div>

      </div>

      <div class="section">
        <div class="section-header"><div class="section-icon">⚔</div><div class="section-label">MATCH OVERVIEW</div></div>

        <div class="stats-grid">
          <div class="stat-card"><div class="stat-val">${s.stats.matches}</div><div class="stat-lbl">MATCHES</div></div>
          <div class="stat-card"><div class="stat-val">${s.stats.cuk}</div><div class="stat-lbl">KALI "CUK"</div></div>
          <div class="stat-card"><div class="stat-val">${s.stats.chaos}</div><div class="stat-lbl">CHAOS LEVEL</div></div>
          <div class="stat-card"><div class="stat-val">${s.stats.start}</div><div class="stat-lbl">JAM MULAI</div></div>
        </div>
      </div>

      <div class="pixel-divider">▪ ▪ ▪ ▪ ▪ ▪ ▪ ▪ ▪ ▪</div>

      ${s.matches.map((m,i) => `
        <div class="section">
          <div class="section-header"><div class="section-icon">${ICONS[i]}</div><div class="section-label">MATCH ${m.num} — ${m.title}</div></div>

            <div class="match-num">GAME ${String(m.num).padStart(2,"0")}</div>
            <div class="match-heroes"><span>HEROES ▸</span> ${m.heroes}</div>

      `).join("")}

  `;
}

function marqueeHTML() {
  return `<div class="marquee-bar"><div class="marquee-track"><span class="marquee-text">${MARQUEE}${MARQUEE}</span></div></div>`;
}

function footerHTML() {
  return `<div class="footer"><p>BARUNG XIII — SURABAYA SQUAD</p><p style="margin-top:10px;color:rgba(0,255,255,.2)">GG WP — SEE YOU NEXT MABAR</p></div>`;
}

function openSession(i) {
  currentSession = SESSIONS[i];
  currentPage = "detail";
  render();
}

function goHome() {
  currentPage = "home";
  currentSession = null;
  render();
}

render();
</script>
